info:
  name: List Comments
  type: http
  seq: 1
  tags:
    - Ticket Comments

http:
  method: GET
  url: "{{baseUrl}}/api/v1/organizations/:org/projects/:project_id/tickets/:ticket_id/comments/"
  params:
    - name: org
      value: ""
      type: path
      description: Organization slug
    - name: ticket_id
      value: ""
      type: path
      description: Ticket ID
    - name: project_id
      value: ""
      type: path
      description: Project ID
    - name: parent_comment_id
      value: ""
      type: query
      description: Filter to fetch specific reply threads
      disabled: true
    - name: limit
      value: "50"
      type: query
    - name: cursor
      value: ""
      type: query
      disabled: true
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

