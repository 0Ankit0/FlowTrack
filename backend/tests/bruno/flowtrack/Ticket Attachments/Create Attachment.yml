info:
  name: Create Attachment
  type: http
  seq: 1
  tags:
    - Ticket Attachments

http:
  method: POST
  url: "{{baseUrl}}/api/v1/organizations/:org/projects/:project_id/tickets/:ticket_id/attachments/"
  params:
    - name: org
      value: ""
      type: path
      description: Organization slug
    - name: ticket_id
      value: ""
      type: path
      description: Ticket ID
    - name: project_id
      value: ""
      type: path
      description: Project ID
  body:
    type: multipart-form
    data:
      - name: file
        type: text
        value: ""
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/organizations/:org/projects/:project_id/tickets/:ticket_id/attachments/"
      method: POST
      params:
        - name: org
          value: ""
          type: path
          description: Organization slug
        - name: ticket_id
          value: ""
          type: path
          description: Ticket ID
        - name: project_id
          value: ""
          type: path
          description: Project ID
      body:
        type: multipart-form
        data:
          - name: file
            type: text
            value: ""
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "",
            "data": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/organizations/:org/projects/:project_id/tickets/:ticket_id/attachments/"
      method: POST
      params:
        - name: org
          value: ""
          type: path
          description: Organization slug
        - name: ticket_id
          value: ""
          type: path
          description: Ticket ID
        - name: project_id
          value: ""
          type: path
          description: Project ID
      body:
        type: multipart-form
        data:
          - name: file
            type: text
            value: ""
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }

docs: Upload a reference document or asset directly to an execution ticket stream.
