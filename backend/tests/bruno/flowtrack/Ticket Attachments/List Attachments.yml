info:
  name: List Attachments
  type: http
  seq: 2
  tags:
    - Ticket Attachments

http:
  method: GET
  url: "{{baseUrl}}/api/v1/organizations/:org/projects/:project_id/tickets/:ticket_id/attachments/"
  params:
    - name: org
      value: ""
      type: path
      description: Organization slug
    - name: ticket_id
      value: ""
      type: path
      description: Ticket ID
    - name: project_id
      value: ""
      type: path
      description: Project ID
    - name: mime_type
      value: ""
      type: query
      description: Filter attachments by mime type
      disabled: true
    - name: limit
      value: "50"
      type: query
    - name: cursor
      value: ""
      type: query
      disabled: true
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

