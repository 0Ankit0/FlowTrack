info:
  name: Get Project
  type: http
  seq: 3
  tags:
    - Projects

http:
  method: GET
  url: "{{baseUrl}}/api/v1/organizations/:org/projects/:project_id"
  params:
    - name: org
      value: "{{TEST_ORG}}"
      type: path
      description: Organization slug
    - name: project_id
      value: "{{TEST_PROJECT_ID}}"
      type: path
      description: Project ID
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: success
    request:
      url: "{{baseUrl}}/api/v1/organizations/:org/projects/:project_id"
      method: GET
      params:
        - name: org
          value: "{{TEST_ORG}}"
          type: path
          description: Organization slug
        - name: project_id
          value: "{{TEST_PROJECT_ID}}"
          type: path
          description: Project ID
    response:
      status: 200
      statusText: OK
      headers:
        - name: date
          value: Thu, 02 Jul 2026 09:04:20 GMT
        - name: server
          value: uvicorn
        - name: content-length
          value: "269"
        - name: content-type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "Project retrieved successfully",
            "data": {
              "name": "testProject",
              "description": "This is a test project",
              "budget_notes": "test",
              "start_date": "2026-07-02",
              "target_end_date": "2026-08-02",
              "id": "0gOg1X9Z",
              "owner_id": "0gOg1X9Z",
              "status": "planning",
              "health": "healthy"
            }
          }
