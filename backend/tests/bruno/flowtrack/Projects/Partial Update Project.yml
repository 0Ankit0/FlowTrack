info:
  name: Partial Update Project
  type: http
  seq: 5
  tags:
    - Projects

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/organizations/:org/projects/:project_id"
  params:
    - name: org
      value: "{{TEST_ORG}}"
      type: path
      description: Organization slug
    - name: project_id
      value: "{{TEST_PROJECT_ID}}"
      type: path
      description: Project ID
  body:
    type: json
    data: |-
      {
        "status": "active",
        "health": "healthy"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

