info:
  name: List Projects
  type: http
  seq: 1
  tags:
    - Projects

http:
  method: GET
  url: "{{BASE_URI}}/api/v1/organizations/:org/projects/"
  params:
    - name: search
      value: ""
      type: query
      description: Search term to filter projects by name or description
      disabled: true
    - name: project_status
      value: ""
      type: query
      description: Filter projects by status
      disabled: true
    - name: cursor
      value: ""
      type: query
      disabled: true
    - name: org
      value: "{{TEST_ORG}}"
      type: path
      description: Organization slug
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: success
    request:
      url: "{{BASE_URI}}/api/v1/organizations/:org/projects/"
      method: GET
      params:
        - name: search
          value: ""
          type: query
          description: Search term to filter projects by name or description
          disabled: true
        - name: project_status
          value: ""
          type: query
          description: Filter projects by status
          disabled: true
        - name: cursor
          value: ""
          type: query
          disabled: true
        - name: org
          value: "{{TEST_ORG}}"
          type: path
          description: Organization slug
    response:
      status: 200
      statusText: OK
      headers:
        - name: date
