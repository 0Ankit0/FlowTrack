info:
  name: Update Project
  type: http
  seq: 4
  tags:
    - Projects

http:
  method: PUT
  url: "{{baseUrl}}/api/v1/organizations/:org/projects/:project_id"
  params:
    - name: org
      value: ""
      type: path
      description: Organization slug
    - name: project_id
      value: ""
      type: path
      description: Project ID
  body:
    type: json
    data: |-
      {
        "name": "",
        "description": "",
        "budget_notes": "",
        "start_date": "",
        "target_end_date": "",
        "owner_id": "",
        "status": "",
        "health": ""
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

