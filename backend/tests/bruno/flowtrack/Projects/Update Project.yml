info:
  name: Update Project
  type: http
  seq: 4
  tags:
    - Projects

http:
  method: PUT
  url: "{{baseUrl}}/api/v1/organizations/:org/projects/:project_id"
  params:
    - name: org
      value: "{{TEST_ORG}}"
      type: path
      description: Organization slug
    - name: project_id
      value: "{{TEST_PROJECT_ID}}"
      type: path
      description: Project ID
  body:
    type: json
    data: |-
      {
        "name": "testOrgUpdate",
        "description": "",
        "budget_notes": ""
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: success
    request:
      url: "{{baseUrl}}/api/v1/organizations/:org/projects/:project_id"
      method: PUT
      params:
        - name: org
          value: "{{TEST_ORG}}"
          type: path
          description: Organization slug
        - name: project_id
          value: "{{TEST_PROJECT_ID}}"
          type: path
          description: Project ID
      body:
        type: json
        data: |-
          {
            "name": "testOrgUpdate",
            "description": "",
            "budget_notes": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: date
          value: Thu, 02 Jul 2026 09:15:53 GMT
