info:
  name: Delete Project
  type: http
  seq: 6
  tags:
    - Projects

http:
  method: DELETE
  url: "{{baseUrl}}/api/v1/organizations/:org/projects/:project_id"
  params:
    - name: org
      value: "{{TEST_ORG}}"
      type: path
      description: Organization slug
    - name: project_id
      value: "{{TEST_PROJECT_ID}}"
      type: path
      description: Project ID
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

