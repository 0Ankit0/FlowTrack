info:
  name: Create Project
  type: http
  seq: 2
  tags:
    - Projects

http:
  method: POST
  url: "{{baseUrl}}/api/v1/organizations/:org/projects/"
  params:
    - name: org
      value: "{{TEST_ORG}}"
      type: path
      description: Organization slug
  body:
    type: json
    data: |-
      {
        "name": "testProject",
        "description": "This is a test project",
        "budget_notes": "test",
        "start_date": "2026-07-02",
        "target_end_date": "2026-08-02",
        "owner_id": "{{TEST_USER_ID}}",
        "status": "planning",
        "health": "healthy"
      }
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody()

        bru.setEnvVar("TEST_PROJECT_ID", body.data.id)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: success
    request:
      url: "{{baseUrl}}/api/v1/organizations/:org/projects/"
      method: POST
      params:
        - name: org
          value: "{{TEST_ORG}}"
          type: path
          description: Organization slug
      body:
        type: json
        data: |-
          {
            "name": "testProject",
            "description": "This is a test project",
            "budget_notes": "test",
            "start_date": "2026-07-02",
            "target_end_date": "2026-08-02",
            "owner_id": "{{TEST_USER_ID}}",
            "status": "planning",
            "health": "healthy"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: date
          value: Thu, 02 Jul 2026 09:02:47 GMT
        - name: server
          value: uvicorn
        - name: content-length
          value: "267"
        - name: content-type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "Project created successfully",
            "data": {
              "name": "testProject",
              "description": "This is a test project",
              "budget_notes": "test",
              "start_date": "2026-07-02",
              "target_end_date": "2026-08-02",
              "id": "0gOg1X9Z",
              "owner_id": "0gOg1X9Z",
              "status": "planning",
              "health": "healthy"
            }
          }
