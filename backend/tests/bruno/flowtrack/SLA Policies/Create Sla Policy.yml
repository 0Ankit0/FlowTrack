          value: ""
          type: path
          description: Organization slug
      body:
        type: json
        data: |-
          {
            "name": "",
            "priority": "low",
            "first_response_minutes": 0,
            "resolution_minutes": 0,
            "is_active": false
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
