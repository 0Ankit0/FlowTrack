info:
  name: Create Sla Policy
  type: http
  seq: 2
  tags:
    - SLA Policies

http:
  method: POST
  url: "{{baseUrl}}/api/v1/organizations/:org/sla-policies/"
  params:
    - name: org
      value: ""
      type: path
      description: Organization slug
  body:
    type: json
    data: |-
      {
        "name": "",
        "priority": "low",
        "first_response_minutes": 0,
        "resolution_minutes": 0,
        "is_active": false
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/organizations/:org/sla-policies/"
