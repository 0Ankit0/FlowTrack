info:
  name: Partial Update Sla Policy
  type: http
  seq: 5
  tags:
    - SLA Policies

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/organizations/:org/sla-policies/:sla_policy_id"
  params:
    - name: org
      value: ""
      type: path
      description: Organization slug
    - name: sla_policy_id
      value: ""
      type: path
      description: SLA Policy ID
  body:
    type: json
    data: |-
      {
        "name": "",
        "priority": "",
        "first_response_minutes": "",
        "resolution_minutes": "",
        "is_active": ""
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

