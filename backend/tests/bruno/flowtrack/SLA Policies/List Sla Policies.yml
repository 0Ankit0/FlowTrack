info:
  name: List Sla Policies
  type: http
  seq: 1
  tags:
    - SLA Policies

http:
  method: GET
  url: "{{baseUrl}}/api/v1/organizations/:org/sla-policies/"
  params:
    - name: org
      value: ""
      type: path
      description: Organization slug
    - name: search
      value: ""
      type: query
      description: Search policies by name
      disabled: true
    - name: priority
      value: ""
      type: query
      description: Filter by priority tier
      disabled: true
    - name: is_active
      value: ""
      type: query
      description: Filter active or deactivated policies
      disabled: true
    - name: limit
      value: "50"
      type: query
    - name: cursor
      value: ""
      type: query
      disabled: true
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

