info:
  name: List Activity Logs
  type: http
  seq: 1
  tags:
    - Ticket Activity Logs

http:
  method: GET
  url: "{{baseUrl}}/api/v1/organizations/:org/projects/:project_id/tickets/:ticket_id/activities/"
  params:
    - name: org
      value: ""
      type: path
      description: Organization slug
    - name: ticket_id
      value: ""
      type: path
      description: Ticket ID
    - name: project_id
      value: ""
      type: path
      description: Project ID
    - name: activity_type
      value: ""
      type: query
      disabled: true
    - name: field_changed
      value: ""
      type: query
      disabled: true
    - name: limit
      value: "50"
      type: query
    - name: cursor
      value: ""
      type: query
      disabled: true
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

