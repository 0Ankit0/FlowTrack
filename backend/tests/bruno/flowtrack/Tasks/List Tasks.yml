info:
  name: List Tasks
  type: http
  seq: 1
  tags:
    - Tasks

http:
  method: GET
  url: "{{baseUrl}}/api/v1/organizations/:org/projects/:project_id/tasks/"
  params:
    - name: org
      value: ""
      type: path
      description: Organization slug
    - name: project_id
      value: ""
      type: path
      description: Project ID
    - name: search
      value: ""
      type: query
      description: Search by title or description
      disabled: true
    - name: status
      value: ""
      type: query
      description: Filter by task status
      disabled: true
    - name: priority
      value: ""
      type: query
      description: Filter by task priority
      disabled: true
    - name: assignee_id
      value: ""
      type: query
      description: Filter by assigned user
      disabled: true
    - name: milestone_id
      value: ""
      type: query
      description: Filter by specific milestone resource
      disabled: true
    - name: parent_task_id
      value: ""
      type: query
      description: Filter subtasks belonging to a parent task id
      disabled: true
    - name: limit
      value: "50"
      type: query
    - name: cursor
      value: ""
      type: query
      disabled: true
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

