info:
  name: Create Ticket
  type: http
  seq: 2
  tags:
    - Tickets

http:
  method: POST
  url: "{{baseUrl}}/api/v1/organizations/:org/projects/:project_id/tickets/"
  params:
    - name: org
      value: ""
      type: path
      description: Organization slug
    - name: project_id
      value: ""
      type: path
      description: Project ID
  body:
    type: json
    data: |-
      {
        "title": "",
        "description": "",
        "status": "backlog",
        "priority": "low",
        "milestone_id": "",
        "task_id": "",
        "assignee_id": "",
        "sla_policy_id": ""
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

