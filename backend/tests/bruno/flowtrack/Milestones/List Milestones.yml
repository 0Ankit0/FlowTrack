info:
  name: List Milestones
  type: http
  seq: 1
  tags:
    - Milestones

http:
  method: GET
  url: "{{baseUrl}}/api/v1/organizations/:org/projects/:project_id/milestones/"
  params:
    - name: org
      value: ""
      type: path
      description: Organization slug
    - name: project_id
      value: ""
      type: path
      description: Project ID
    - name: search
      value: ""
      type: query
      description: Search by title or description
      disabled: true
    - name: milestone_status
      value: ""
      type: query
      description: Filter milestones by status
      disabled: true
    - name: limit
      value: "50"
      type: query
    - name: cursor
      value: ""
      type: query
      disabled: true
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

