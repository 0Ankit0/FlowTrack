info:
  name: Get Milestone
  type: http
  seq: 3
  tags:
    - Milestones

http:
  method: GET
  url: "{{baseUrl}}/api/v1/organizations/:org/projects/:project_id/milestones/:milestone_id"
  params:
    - name: org
      value: ""
      type: path
      description: Organization slug
    - name: milestone_id
      value: ""
      type: path
      description: Milestone ID
    - name: project_id
      value: ""
      type: path
      description: Project ID
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

