info:
  name: Create Milestone
  type: http
  seq: 2
  tags:
    - Milestones

http:
  method: POST
  url: "{{baseUrl}}/api/v1/organizations/:org/projects/:project_id/milestones/"
  params:
    - name: org
      value: ""
      type: path
      description: Organization slug
    - name: project_id
      value: ""
      type: path
      description: Project ID
  body:
    type: json
    data: |-
      {
        "title": "",
        "description": "",
        "planned_date": "",
        "due_date": "",
        "owner_id": "",
        "status": "draft",
        "sorted_order": ""
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

